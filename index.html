<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>居家托育名額</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans TC', sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const MAX_TOTAL = 4;
    const MAX_UNDER2 = 2;
    const ADMIN_PASSWORD = "590702";
    const STORAGE_KEY = "babysitter-children";

    function ageInMonths(birthYearMonth) {
      if (!birthYearMonth) return 0;
      const [y, m] = birthYearMonth.split("-").map(Number);
      const now = new Date();
      return (now.getFullYear() - y) * 12 + (now.getMonth() + 1 - m);
    }

    function ageLabel(months) {
      if (months < 12) return "未滿1歲";
      if (months < 24) return "1歲";
      if (months < 36) return "2歲";
      return `${Math.floor(months / 12)}歲`;
    }

    function isUnder2(months) { return months < 24; }

    function graduationDate(birthYearMonth) {
      if (!birthYearMonth) return null;
      const [y, m] = birthYearMonth.split("-").map(Number);
      return new Date(y + 3, m - 1, 1);
    }

    function formatYearMonth(date) {
      if (!date) return "";
      return `${date.getFullYear()} 年 ${date.getMonth() + 1} 月`;
    }

    function monthsUntilGrad(birthYearMonth) {
      const grad = graduationDate(birthYearMonth);
      if (!grad) return null;
      const now = new Date();
      return (grad.getFullYear() - now.getFullYear()) * 12 + (grad.getMonth() - now.getMonth());
    }

    function calcSlots(children) {
      const total = children.length;
      const under2Count = children.filter(c => isUnder2(ageInMonths(c.birth))).length;
      const remainTotal = Math.max(0, MAX_TOTAL - total);
      const remainUnder2 = Math.max(0, MAX_UNDER2 - under2Count);
      const canTakeUnder2 = Math.min(remainTotal, remainUnder2);
      return { total, under2Count, remainTotal, remainUnder2, canTakeUnder2 };
    }

    function getUpcoming(children) {
      const now = new Date();
      const result = [];
      for (let i = 1; i <= 9; i++) {
        const target = new Date(now.getFullYear(), now.getMonth() + i, 1);
        const grads = children.filter(c => {
          const g = graduationDate(c.birth);
          return g && g.getFullYear() === target.getFullYear() && g.getMonth() === target.getMonth();
        });
        if (grads.length > 0) result.push({ date: target, count: grads.length, children: grads });
      }
      return result;
    }

    // ── 家長查看 ──
    function PublicView({ children }) {
      const { under2Count, remainTotal, remainUnder2, canTakeUnder2 } = calcSlots(children);
      const isFull = remainTotal === 0;
      const upcoming = getUpcoming(children);

      return (
        <div style={{ minHeight: "100vh", background: "#FFF9F0" }}>
          <div style={{ background: "linear-gradient(135deg, #FF8C69, #FFB347)", padding: "40px 24px 32px", textAlign: "center", position: "relative", overflow: "hidden" }}>
            <div style={{ position: "absolute", top: -30, right: -30, width: 120, height: 120, background: "rgba(255,255,255,0.15)", borderRadius: "50%" }} />
            <div style={{ position: "absolute", bottom: -20, left: -20, width: 80, height: 80, background: "rgba(255,255,255,0.1)", borderRadius: "50%" }} />
            <div style={{ fontSize: 48, marginBottom: 8 }}>🏠</div>
            <h1 style={{ color: "#fff", fontSize: 26, fontWeight: 700, margin: 0 }}>居家托育 · 即時名額</h1>
            <p style={{ color: "rgba(255,255,255,0.85)", fontSize: 14, marginTop: 6 }}>日間托育（半日 / 全日）</p>
          </div>

          <div style={{ maxWidth: 420, margin: "0 auto", padding: "24px 20px" }}>
            <div style={{ background: isFull ? "#FFF0F0" : "#F0FFF4", border: `2px solid ${isFull ? "#FFB3B3" : "#6FCF97"}`, borderRadius: 20, padding: "28px 24px", textAlign: "center", marginBottom: 20, boxShadow: "0 4px 20px rgba(0,0,0,0.06)" }}>
              <div style={{ fontSize: 56, marginBottom: 8 }}>{isFull ? "😴" : remainTotal === 1 ? "🌟" : "✨"}</div>
              <div style={{ fontSize: 36, fontWeight: 800, color: isFull ? "#E55353" : "#27AE60", lineHeight: 1 }}>
                {isFull ? "目前額滿" : `還有 ${remainTotal} 個名額`}
              </div>
              <div style={{ color: "#888", fontSize: 14, marginTop: 8 }}>總收托上限 {MAX_TOTAL} 人，目前已帶 {children.length} 人</div>
            </div>

            <div style={{ marginBottom: 20 }}>
              <h3 style={{ fontSize: 15, fontWeight: 700, color: "#555", marginBottom: 12 }}>📋 目前可收托年齡</h3>
              <SlotCard emoji="👶" label="未滿 2 歲（嬰幼兒）" count={canTakeUnder2} color="#FF8C69" bg="#FFF3EF" note={`未滿2歲上限2人，目前已收 ${under2Count} 人`} />
              <SlotCard emoji="🧒" label="2 歲以上（最多收到3歲）" count={remainTotal} color="#4A9BD4" bg="#EFF6FF" note={`依總名額計算，剩餘 ${remainTotal} 個空位`} />
            </div>

            {upcoming.length > 0 && (
              <div style={{ marginBottom: 20 }}>
                <h3 style={{ fontSize: 15, fontWeight: 700, color: "#555", marginBottom: 12 }}>📅 未來名額釋出預告</h3>
                {upcoming.map((u, i) => (
                  <div key={i} style={{ background: "#fff", border: "1.5px solid #E8F4FD", borderRadius: 14, padding: "14px 18px", marginBottom: 8, display: "flex", alignItems: "center", gap: 14, boxShadow: "0 2px 8px rgba(0,0,0,0.04)" }}>
                    <div style={{ background: "linear-gradient(135deg, #667eea, #764ba2)", color: "#fff", borderRadius: 10, padding: "8px 12px", textAlign: "center", minWidth: 52, fontSize: 13, fontWeight: 700, lineHeight: 1.6 }}>
                      {u.date.getFullYear()}<br />{u.date.getMonth() + 1}月
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 600, fontSize: 15, color: "#333" }}>將釋出 {u.count} 個名額</div>
                      <div style={{ fontSize: 12, color: "#aaa", marginTop: 2 }}>
                        {u.children.map(c => isUnder2(ageInMonths(c.birth)) ? "嬰幼兒名額" : "2歲以上名額").join("、")}
                      </div>
                    </div>
                    <div style={{ fontSize: 22 }}>🎓</div>
                  </div>
                ))}
                <div style={{ fontSize: 12, color: "#bbb", textAlign: "center", marginTop: 4 }}>預告為參考，實際以保母公告為準</div>
              </div>
            )}

            <div style={{ background: "#FFFBEA", border: "1px solid #FFE082", borderRadius: 14, padding: "16px 18px", fontSize: 13, color: "#856404", lineHeight: 1.8 }}>
              <div style={{ fontWeight: 700, marginBottom: 4 }}>⚠️ 注意事項</div>
              <div>• 日間托育每位保母最多收托 4 名</div>
              <div>• 其中未滿 2 歲最多 2 名</div>
              <div>• 本保母收托至滿 3 歲畢業</div>
              <div>• 有意洽詢請盡早聯繫</div>
            </div>
            <div style={{ textAlign: "center", marginTop: 28, color: "#ccc", fontSize: 12 }}>資料由保母即時維護</div>
          </div>
        </div>
      );
    }

    function SlotCard({ emoji, label, count, color, bg, note }) {
      return (
        <div style={{ background: bg, borderRadius: 14, padding: "16px 18px", marginBottom: 10, display: "flex", alignItems: "center", gap: 14, boxShadow: "0 2px 8px rgba(0,0,0,0.04)" }}>
          <div style={{ fontSize: 28 }}>{emoji}</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontWeight: 600, fontSize: 15, color: "#333" }}>{label}</div>
            <div style={{ fontSize: 12, color: "#999", marginTop: 2 }}>{note}</div>
          </div>
          <div style={{ background: count === 0 ? "#f5f5f5" : color, color: count === 0 ? "#aaa" : "#fff", borderRadius: 10, padding: "6px 14px", fontWeight: 800, fontSize: 18, minWidth: 52, textAlign: "center" }}>
            {count === 0 ? "滿" : `${count}位`}
          </div>
        </div>
      );
    }

    // ── 管理端 ──
    function AdminView({ children, setChildren }) {
      const [form, setForm] = useState({ name: "", birth: "", note: "" });
      const { under2Count, remainTotal, remainUnder2 } = calcSlots(children);
      const formMonths = form.birth ? ageInMonths(form.birth) : 0;
      const formIsOver3 = false;
      const under2Blocked = isUnder2(formMonths) && remainUnder2 === 0;
      const canAdd = form.name.trim() && form.birth && !under2Blocked && remainTotal > 0;

      function addChild() {
        if (!canAdd) return;
        setChildren([...children, { id: Date.now(), ...form }]);
        setForm({ name: "", birth: "", note: "" });
      }

      return (
        <div style={{ minHeight: "100vh", background: "#F8F4FF" }}>
          <div style={{ background: "linear-gradient(135deg, #7C6FCD, #A78BFA)", padding: "32px 24px 28px", color: "#fff" }}>
            <div style={{ maxWidth: 480, margin: "0 auto" }}>
              <div style={{ fontSize: 13, opacity: 0.75, marginBottom: 4 }}>🔒 保母管理端</div>
              <h1 style={{ fontSize: 22, fontWeight: 700, margin: 0 }}>收托名額管理</h1>
            </div>
          </div>
          <div style={{ maxWidth: 480, margin: "0 auto", padding: "20px 16px" }}>
            <div style={{ background: "#fff", borderRadius: 16, padding: "20px", marginBottom: 16, boxShadow: "0 2px 12px rgba(124,111,205,0.1)", display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, textAlign: "center" }}>
              <StatBox label="已收托" value={children.length} total={MAX_TOTAL} color="#7C6FCD" />
              <StatBox label="剩餘名額" value={remainTotal} color={remainTotal === 0 ? "#E55353" : "#27AE60"} />
              <StatBox label="未滿2歲可收" value={remainUnder2} color={remainUnder2 === 0 ? "#E55353" : "#FF8C69"} />
            </div>

            <div style={{ marginBottom: 16 }}>
              <h3 style={{ fontSize: 15, fontWeight: 700, color: "#555", margin: "0 0 10px 2px" }}>目前收托中（{children.length} 人）</h3>
              {children.length === 0
                ? <div style={{ background: "#fff", borderRadius: 12, padding: "20px", textAlign: "center", color: "#bbb", fontSize: 14 }}>目前沒有收托中的孩子</div>
                : children.map(c => {
                  const months = ageInMonths(c.birth);
                  const monthsLeft = monthsUntilGrad(c.birth);
                  const gradSoon = monthsLeft !== null && monthsLeft <= 3 && monthsLeft >= 0;
                  return (
                    <div key={c.id} style={{ background: "#fff", borderRadius: 12, padding: "14px 16px", marginBottom: 8, display: "flex", alignItems: "center", gap: 12, boxShadow: "0 1px 6px rgba(0,0,0,0.05)", border: gradSoon ? "1.5px solid #FFD0BC" : "1.5px solid transparent" }}>
                      <div style={{ fontSize: 24 }}>{isUnder2(months) ? "👶" : "🧒"}</div>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: 600, fontSize: 15 }}>{c.name}</div>
                        <div style={{ fontSize: 12, color: "#888", marginTop: 2 }}>{ageLabel(months)}（{months}個月）{c.note && ` · ${c.note}`}</div>
                        <div style={{ fontSize: 12, marginTop: 2, color: gradSoon ? "#E55353" : "#aaa" }}>
                          🎓 {formatYearMonth(graduationDate(c.birth))} 畢業{gradSoon && ` · 還有 ${monthsLeft} 個月`}
                        </div>
                      </div>
                      <button onClick={() => setChildren(children.filter(x => x.id !== c.id))} style={{ background: "#FFF0F0", color: "#E55353", border: "none", borderRadius: 8, padding: "6px 12px", fontSize: 13, cursor: "pointer", fontWeight: 600 }}>移除</button>
                    </div>
                  );
                })}
            </div>

            {remainTotal > 0 && (
              <div style={{ background: "#fff", borderRadius: 16, padding: "20px", boxShadow: "0 2px 12px rgba(124,111,205,0.08)" }}>
                <h3 style={{ fontSize: 15, fontWeight: 700, color: "#555", margin: "0 0 14px 0" }}>➕ 新增收托</h3>
                <div style={{ marginBottom: 10 }}>
                  <label style={{ fontSize: 13, color: "#666", display: "block", marginBottom: 4 }}>稱呼</label>
                  <input value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="例：小寶、A寶"
                    style={{ width: "100%", border: "1.5px solid #E0D9FF", borderRadius: 10, padding: "10px 12px", fontSize: 15, outline: "none", fontFamily: "inherit" }} />
                </div>
                <div style={{ marginBottom: 10 }}>
                  <label style={{ fontSize: 13, color: "#666", display: "block", marginBottom: 4 }}>出生年月</label>
                  <input type="month" value={form.birth} onChange={e => setForm({ ...form, birth: e.target.value })}
                    style={{ width: "100%", border: "1.5px solid #E0D9FF", borderRadius: 10, padding: "10px 12px", fontSize: 15, outline: "none", fontFamily: "inherit" }} />
                  {form.birth && <div style={{ fontSize: 12, color: "#888", marginTop: 4, paddingLeft: 4 }}>
                    {`目前 ${ageInMonths(form.birth)} 個月（${ageLabel(ageInMonths(form.birth))}）・預計 ${formatYearMonth(graduationDate(form.birth))} 畢業`}
                  </div>}
                </div>
                <div style={{ marginBottom: 14 }}>
                  <label style={{ fontSize: 13, color: "#666", display: "block", marginBottom: 4 }}>備注（選填）</label>
                  <input value={form.note} onChange={e => setForm({ ...form, note: e.target.value })} placeholder="例：週一三五、全日..."
                    style={{ width: "100%", border: "1.5px solid #E0D9FF", borderRadius: 10, padding: "10px 12px", fontSize: 15, outline: "none", fontFamily: "inherit" }} />
                </div>
                {under2Blocked && <div style={{ background: "#FFF3CD", border: "1px solid #FFCA2C", borderRadius: 8, padding: "8px 12px", fontSize: 13, color: "#856404", marginBottom: 10 }}>⚠️ 未滿2歲名額已滿（上限2名），無法再新增</div>}
                <button onClick={addChild} disabled={!canAdd} style={{ width: "100%", background: !canAdd ? "#E0D9FF" : "linear-gradient(135deg, #7C6FCD, #A78BFA)", color: "#fff", border: "none", borderRadius: 10, padding: "13px", fontSize: 16, fontWeight: 700, cursor: !canAdd ? "not-allowed" : "pointer", fontFamily: "inherit" }}>新增</button>
              </div>
            )}
            {remainTotal === 0 && <div style={{ background: "#FFF0F0", border: "1.5px solid #FFB3B3", borderRadius: 14, padding: "16px", textAlign: "center", color: "#E55353", fontWeight: 600 }}>🈵 已達收托上限（{MAX_TOTAL} 人）</div>}
          </div>
        </div>
      );
    }

    function StatBox({ label, value, total, color }) {
      return (
        <div>
          <div style={{ fontSize: 28, fontWeight: 800, color }}>{value}{total !== undefined && <span style={{ fontSize: 14, color: "#ccc", fontWeight: 400 }}>/{total}</span>}</div>
          <div style={{ fontSize: 12, color: "#999", marginTop: 2 }}>{label}</div>
        </div>
      );
    }

    function LoginView({ onLogin }) {
      const [pw, setPw] = useState("");
      const [err, setErr] = useState(false);
      return (
        <div style={{ minHeight: "100vh", background: "#F8F4FF", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
          <div style={{ background: "#fff", borderRadius: 20, padding: "36px 28px", width: "100%", maxWidth: 340, boxShadow: "0 8px 32px rgba(124,111,205,0.15)", textAlign: "center" }}>
            <div style={{ fontSize: 48, marginBottom: 12 }}>🔐</div>
            <h2 style={{ fontSize: 20, fontWeight: 700, color: "#333", margin: "0 0 6px" }}>保母管理端</h2>
            <p style={{ color: "#aaa", fontSize: 14, margin: "0 0 24px" }}>請輸入管理密碼</p>
            <input type="password" value={pw} onChange={e => { setPw(e.target.value); setErr(false); }} onKeyDown={e => e.key === "Enter" && (pw === ADMIN_PASSWORD ? onLogin() : setErr(true))}
              placeholder="密碼" style={{ width: "100%", border: `1.5px solid ${err ? "#E55353" : "#E0D9FF"}`, borderRadius: 10, padding: "12px", fontSize: 16, outline: "none", marginBottom: 8, fontFamily: "inherit", textAlign: "center", letterSpacing: 4 }} />
            {err && <div style={{ color: "#E55353", fontSize: 13, marginBottom: 8 }}>密碼錯誤</div>}
            <button onClick={() => pw === ADMIN_PASSWORD ? onLogin() : setErr(true)} style={{ width: "100%", background: "linear-gradient(135deg, #7C6FCD, #A78BFA)", color: "#fff", border: "none", borderRadius: 10, padding: "13px", fontSize: 16, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", marginTop: 4 }}>登入</button>
            
          </div>
        </div>
      );
    }

    // ── 主程式 ──
    function App() {
      const [mode, setMode] = useState("public");
      const [children, setChildren] = useState([]);

      useEffect(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved) setChildren(JSON.parse(saved));
        } catch (e) {}
      }, []);

      useEffect(() => {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(children)); }
        catch (e) {}
      }, [children]);

      return (
        <div>
          <div style={{ position: "fixed", bottom: 20, right: 20, zIndex: 999, display: "flex", gap: 8 }}>
            <button onClick={() => setMode("public")} style={{ background: mode === "public" ? "#FF8C69" : "rgba(255,255,255,0.9)", color: mode === "public" ? "#fff" : "#888", border: "1.5px solid #FFD0BC", borderRadius: 20, padding: "8px 16px", fontSize: 13, cursor: "pointer", fontWeight: 600, boxShadow: "0 2px 8px rgba(0,0,0,0.1)", fontFamily: "inherit" }}>👨‍👩‍👧 家長查看</button>
            <button onClick={() => setMode(mode === "admin" ? "public" : "login")} style={{ background: mode === "admin" ? "#7C6FCD" : "rgba(255,255,255,0.9)", color: mode === "admin" ? "#fff" : "#888", border: "1.5px solid #E0D9FF", borderRadius: 20, padding: "8px 16px", fontSize: 13, cursor: "pointer", fontWeight: 600, boxShadow: "0 2px 8px rgba(0,0,0,0.1)", fontFamily: "inherit" }}>🔒 {mode === "admin" ? "退出管理" : "管理端"}</button>
          </div>
          {mode === "public" && <PublicView children={children} />}
          {mode === "login" && <LoginView onLogin={() => setMode("admin")} />}
          {mode === "admin" && <AdminView children={children} setChildren={setChildren} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
